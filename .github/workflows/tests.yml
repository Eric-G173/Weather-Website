name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q


  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PA_PRIVATE_KEY }}

      - name: Deploy to PythonAnywhere
        run: |
          ssh ${{ secrets.PA_USERNAME }}@${{ secrets.PA_HOST }} "
            cd ~/'Weather Website' &&
            git pull &&
            pa_reload_webapp ${{ secrets.PA_USERNAME }}.pythonanywhere.com
          "
