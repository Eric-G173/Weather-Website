<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudySensor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"> 
</head>

<body>
<header class="index-title">
  <h1>CloudySensor</h1>
</header>


<form class="city-form button-group" action="/submit" method="POST">
    <label for="city" class="sr-only" >Enter a city</label>
    <input type="text" id="city" name="city" placeholder="Enter a City">
    <button type="submit" class="index-btn">Submit</button>
</form>
<div class="city-form button-group">
    <button id="useLocation" class="index-btn" type="button">Use Current Location</button>
</div>

<nav class = "about-link button-group">
    <a href ="#" class="index-btn">About me</a>
    <a href = "#" class="index-btn">Test</a>
</nav>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<script>
document.getElementById("useLocation").addEventListener("click", function (event) {
    event.preventDefault();

    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser.");
        return;
    }

    navigator.geolocation.getCurrentPosition(success, geoError);
});

async function success(position) {
    console.log("GOT LOCATION");
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    window.location.href = `/submit?lat=${lat}&lon=${lon}`;

}

function geoError() {
    alert("Unable to retrieve your location.");
}
</script>
</body>


</html>
